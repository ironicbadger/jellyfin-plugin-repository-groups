<div id="pluginRepositoryGroupsPage" data-role="page" class="page type-interior pluginConfigurationPage" data-title="Plugin Repository Groups" data-controller="__plugin/pluginrepositorygroupsjs">
    <style>
        .repositoryGroupsPage .repoGroupsToolbar {
            display: grid;
            grid-template-columns: minmax(12rem, 1fr) minmax(12rem, 1fr) minmax(14rem, 2fr) auto;
            gap: 1rem;
            align-items: end;
            margin: 1rem 0;
        }

        .repositoryGroupsPage .repoGroupsSummary {
            color: var(--theme-text-secondary, rgba(255, 255, 255, .7));
            margin-bottom: 1rem;
        }

        .repositoryGroupsPage .repoGroup {
            margin: 0 0 2rem;
        }

        .repositoryGroupsPage .repoGroupHeader {
            align-items: baseline;
            border-bottom: 1px solid rgba(255, 255, 255, .16);
            display: flex;
            flex-wrap: wrap;
            gap: .35rem .75rem;
            justify-content: space-between;
            margin-bottom: .5rem;
            padding-bottom: .5rem;
        }

        .repositoryGroupsPage .repoGroupTitle {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .repositoryGroupsPage .repoGroupMeta {
            color: var(--theme-text-secondary, rgba(255, 255, 255, .7));
            font-size: .9rem;
        }

        .repositoryGroupsPage .repoGroupUrl {
            flex-basis: 100%;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .repositoryGroupsPage .repoPluginGrid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fill, minmax(13rem, 1fr));
        }

        .repositoryGroupsPage .repoPluginCard {
            background: rgba(255, 255, 255, .055);
            border: 1px solid rgba(255, 255, 255, .11);
            border-radius: .5rem;
            color: inherit;
            display: block;
            min-width: 0;
            overflow: hidden;
            text-decoration: none;
            transition: background-color 140ms ease, border-color 140ms ease, transform 140ms ease;
        }

        .repositoryGroupsPage .repoPluginCard:hover,
        .repositoryGroupsPage .repoPluginCard:focus-visible {
            background: rgba(255, 255, 255, .09);
            border-color: rgba(255, 255, 255, .22);
            transform: translateY(-1px);
        }

        .repositoryGroupsPage .repoPluginThumb {
            align-items: center;
            aspect-ratio: 16 / 9;
            background:
                radial-gradient(circle at 24% 20%, rgba(255, 255, 255, .28), transparent 28%),
                linear-gradient(135deg, hsl(var(--repo-card-hue), 50%, 35%), hsl(calc(var(--repo-card-hue) + 42), 42%, 20%));
            display: flex;
            justify-content: center;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        .repositoryGroupsPage .repoPluginThumb::before {
            background:
                linear-gradient(90deg, rgba(255, 255, 255, .16) 0 .55rem, transparent .55rem 100%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, .18) 0 .38rem, transparent .38rem 1.1rem);
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: .45rem;
            content: "";
            height: 48%;
            opacity: .7;
            position: absolute;
            width: 58%;
        }

        .repositoryGroupsPage .repoPluginThumb::after {
            background: rgba(0, 0, 0, .16);
            bottom: 0;
            content: "";
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
        }

        .repositoryGroupsPage .repoPluginImage {
            height: 100%;
            object-fit: cover;
            position: relative;
            width: 100%;
            z-index: 1;
        }

        .repositoryGroupsPage .repoPluginInitials {
            color: rgba(255, 255, 255, .92);
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 700;
            line-height: 1;
            position: relative;
            text-shadow: 0 .15rem .45rem rgba(0, 0, 0, .45);
            z-index: 1;
        }

        .repositoryGroupsPage .repoPluginThumb-hasImage .repoPluginInitials {
            display: none;
        }

        .repositoryGroupsPage .repoPluginBody {
            padding: .8rem .9rem .9rem;
        }

        .repositoryGroupsPage .repoPluginName {
            display: block;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .repositoryGroupsPage .repoPluginMeta {
            color: var(--theme-text-secondary, rgba(255, 255, 255, .7));
            display: flex;
            flex-wrap: wrap;
            font-size: .86rem;
            gap: .35rem .5rem;
            margin-top: .3rem;
        }

        .repositoryGroupsPage .repoPluginDescription {
            color: var(--theme-text-secondary, rgba(255, 255, 255, .7));
            display: -webkit-box;
            font-size: .86rem;
            line-height: 1.35;
            margin-top: .55rem;
            min-height: 2.3em;
            overflow: hidden;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .repositoryGroupsPage .repoEmpty,
        .repositoryGroupsPage .repoError {
            border: 1px solid rgba(255, 255, 255, .16);
            padding: 1rem;
        }

        .repositoryGroupsPage .repoError {
            border-color: rgba(244, 67, 54, .65);
        }

        @media (max-width: 50em) {
            .repositoryGroupsPage .repoGroupsToolbar {
                grid-template-columns: 1fr;
            }

            .repositoryGroupsPage .repoPluginGrid {
                grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
            }
        }
    </style>

    <div data-role="content">
        <div class="content-primary repositoryGroupsPage">
            <h1>Plugin Repository Groups</h1>

            <div class="repoGroupsToolbar">
                <div class="selectContainer">
                    <label class="selectLabel" for="repoGroupsStatus">Status</label>
                    <select is="emby-select" id="repoGroupsStatus" class="emby-select-withcolor emby-select">
                        <option value="installed" selected>Installed</option>
                        <option value="available">Available</option>
                        <option value="all">All</option>
                    </select>
                </div>

                <div class="selectContainer">
                    <label class="selectLabel" for="repoGroupsSort">Repository sort</label>
                    <select is="emby-select" id="repoGroupsSort" class="emby-select-withcolor emby-select">
                        <option value="name" selected>Name</option>
                        <option value="count">Plugin count</option>
                    </select>
                </div>

                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="repoGroupsSearch">Search</label>
                    <input is="emby-input" id="repoGroupsSearch" type="text" autocomplete="off" />
                </div>

                <button is="emby-button" type="button" class="raised button-submit emby-button" id="repoGroupsRefresh">
                    <span>Refresh</span>
                </button>
            </div>

            <div class="repoGroupsSummary" id="repoGroupsSummary"></div>
            <div id="repoGroupsError" class="repoError hide"></div>
            <div id="repoGroupsResults"></div>
        </div>
    </div>
</div>
